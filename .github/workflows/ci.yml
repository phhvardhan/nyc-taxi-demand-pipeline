name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest boto3 pandas pyarrow requests python-dotenv python-dateutil

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short

    - name: Validate DAG syntax
      run: |
        python -c "
        import ast
        with open('airflow/dags/nyc_taxi_pipeline_dag.py') as f:
            ast.parse(f.read())
        print('DAG syntax OK')
        "